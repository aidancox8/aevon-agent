name: Signals Digest

# Publishes signals/latest.md for the "Aevon morning replies briefing" cloud
# routine, which reads it via raw.githubusercontent.com (its sandbox cannot
# reach supabase.co). Runs weekdays 7:35am PT, before the 8:05am routine.

on:
  workflow_dispatch:
  schedule:
    - cron: '35 14 * * 1-5'

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build signals digest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: node signals-digest.js

      - name: Commit digest
        run: |
          git config user.name "aevon-bot"
          git config user.email "aidan@aevon.ca"
          git add signals/latest.md
          git diff --cached --quiet && echo "No changes" || (git commit -m "signals: daily digest" && git push)

      - name: Alert on failure
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"from\":\"$FROM_EMAIL\",\"to\":\"aidan@aevon.ca\",\"subject\":\"[Aevon ALERT] Signals digest failed\",\"text\":\"The Signals Digest workflow failed, so the morning briefing will have stale or missing signals. Check the run: $RUN_URL\"}"
