name: Personalize Leads

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max leads to personalize (blank = all)'
        required: false
        default: ''
  schedule:
    - cron: '0 13 * * 1-5'  # Mon-Fri 6am PT — before the sender runs, fills fresh copy

jobs:
  personalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Personalize queued leads
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_AGENT: ${{ secrets.GEMINI_API_KEY_AGENT }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: node personalizer.js ${{ inputs.limit != '' && format('--limit {0}', inputs.limit) || '' }}

      - name: Alert on failure
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"from\":\"$FROM_EMAIL\",\"to\":\"aidan@aevon.ca\",\"subject\":\"[Aevon ALERT] Personalizer failed\",\"text\":\"The Personalize Leads workflow failed on its scheduled run. Fresh email copy may not have been generated, which can starve the sender. Check the run: $RUN_URL\"}"
