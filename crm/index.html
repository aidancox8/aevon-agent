<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aevon CRM</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='8' y1='8' x2='56' y2='56' gradientUnits='userSpaceOnUse'%3E%3Cstop offset='0' stop-color='%236366F1'/%3E%3Cstop offset='1' stop-color='%237C3AED'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='%231E1B4B'/%3E%3Cpath d='M8 56 L32 8 L40 24 L24 56 Z' fill='url(%23g)'/%3E%3Cpath d='M40 24 L56 56 L32 56 L32 40 Z' fill='url(%23g)' opacity='0.55'/%3E%3Cpath d='M32 40 L40 40 L40 24 L36 32 Z' fill='url(%23g)'/%3E%3C/svg%3E">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0E0C18;
      --surface: #13111F;
      --border: rgba(99,102,241,0.15);
      --accent: #6366F1;
      --text: #F8FAFC;
      --text2: #B4C2D0;
      --text3: #6B7E94;
      --green: #22C55E;
      --yellow: #EAB308;
      --red: #EF4444;
    }
    .light {
      --bg: #F4F5F7;
      --surface: #FFFFFF;
      --border: rgba(99,102,241,0.15);
      --accent: #6366F1;
      --text: #111827;
      --text2: #374151;
      --text3: #6B7280;
      --green: #16A34A;
      --yellow: #CA8A04;
      --red: #DC2626;
    }
    .light .btn-ghost { background: rgba(0,0,0,0.05); }
    .light .btn-ghost:hover { background: rgba(0,0,0,0.08); }
    .light .search-input, .light .filter-select, .light .form-input { background: #F9FAFB; color: var(--text); }
    .light .metric-bar-wrap { background: rgba(0,0,0,0.07); }
    .light tr:hover td { background: rgba(99,102,241,0.05); }
    .status-picker { position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:4px;z-index:500;box-shadow:0 8px 24px rgba(0,0,0,0.35);min-width:110px; }
    .status-opt { padding:5px 12px;cursor:pointer;border-radius:4px;margin-bottom:2px;display:block; }
    .status-opt:hover { opacity:0.75; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.5; }

    /* Layout */
    .app { display: flex; min-height: 100vh; }
    .sidebar { width: 220px; min-height: 100vh; background: var(--surface); border-right: 1px solid var(--border); padding: 24px 0; flex-shrink: 0; }
    .main { flex: 1; padding: 32px; overflow-x: hidden; }

    /* Sidebar */
    .logo { padding: 0 20px 24px; font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 20px; color: var(--text3); cursor: pointer; transition: all 0.15s; font-size: 13.5px; border-left: 2px solid transparent; }
    .nav-item:hover { color: var(--text2); background: rgba(99,102,241,0.05); }
    .nav-item.active { color: var(--text); border-left-color: var(--accent); background: rgba(99,102,241,0.08); }
    .nav-section { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); padding: 16px 20px 6px; }

    /* Header */
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
    .page-title { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
    .btn { padding: 8px 16px; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #5254cc; }
    .btn-ghost { background: rgba(255,255,255,0.06); color: var(--text2); border: 1px solid var(--border); }
    .btn-ghost:hover { background: rgba(255,255,255,0.1); }

    /* Stat cards */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; }
    .stat-label { font-size: 12px; color: var(--text3); margin-bottom: 6px; }
    .stat-value { font-size: 26px; font-weight: 700; letter-spacing: -0.03em; }
    .stat-sub { font-size: 11.5px; color: var(--text3); margin-top: 4px; }

    /* Table */
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .table-toolbar { display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--border); }
    .search-input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 6px; padding: 7px 12px; color: var(--text); font-size: 13px; outline: none; }
    .search-input:focus { border-color: var(--accent); }
    .filter-select { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; color: var(--text2); font-size: 13px; outline: none; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 10px 16px; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text3); border-bottom: 1px solid var(--border); }
    td { padding: 12px 16px; border-bottom: 1px solid rgba(99,102,241,0.06); color: var(--text2); font-size: 13px; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(99,102,241,0.04); color: var(--text); }
    .empty { text-align: center; padding: 48px; color: var(--text3); }

    /* Badges */
    .badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-queued { background: rgba(99,102,241,0.15); color: #818CF8; }
    .badge-paused { background: rgba(148,163,184,0.15); color: #94A3B8; }
    .badge-sent { background: rgba(34,197,94,0.15); color: #4ADE80; }
    .badge-replied { background: rgba(34,197,94,0.25); color: #22C55E; }
    .badge-bounced { background: rgba(239,68,68,0.15); color: #F87171; }
    .badge-complained { background: rgba(239,68,68,0.2); color: #EF4444; }
    .badge-converted { background: rgba(99,102,241,0.3); color: #6366F1; }
    .badge-prospect { background: rgba(234,179,8,0.15); color: #FCD34D; }
    .badge-active { background: rgba(34,197,94,0.15); color: #4ADE80; }
    .badge-completed { background: rgba(99,102,241,0.15); color: #818CF8; }
    .badge-scoping { background: rgba(234,179,8,0.15); color: #FCD34D; }
    .badge-in_progress { background: rgba(99,102,241,0.15); color: #818CF8; }
    .badge-review { background: rgba(251,146,60,0.15); color: #FB923C; }
    .badge-website_lead { background: rgba(251,146,60,0.15); color: #FB923C; }

    /* Score pill */
    .score { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 20px; border-radius: 4px; font-size: 11px; font-weight: 700; }
    .score-high { background: rgba(34,197,94,0.15); color: #4ADE80; }
    .score-mid { background: rgba(234,179,8,0.15); color: #FCD34D; }
    .score-low { background: rgba(239,68,68,0.15); color: #F87171; }

    /* Analytics bars */
    .analytics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }
    .analytics-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
    .analytics-title { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 16px; }
    .metric-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .metric-label { font-size: 12px; color: var(--text3); width: 100px; flex-shrink: 0; }
    .metric-bar-wrap { flex: 1; background: rgba(255,255,255,0.05); border-radius: 4px; height: 6px; }
    .metric-bar { height: 6px; border-radius: 4px; transition: width 0.4s ease; }
    .metric-val { font-size: 12px; font-weight: 600; color: var(--text); width: 36px; text-align: right; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 520px; padding: 28px; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .modal-title { font-size: 17px; font-weight: 700; }
    .modal-close { background: none; border: none; color: var(--text3); font-size: 20px; cursor: pointer; line-height: 1; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text3); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
    .form-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 6px; padding: 9px 12px; color: var(--text); font-size: 13px; outline: none; }
    .form-input:focus { border-color: var(--accent); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 24px; }
    .tab { padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text3); background: none; border: none; transition: all 0.15s; }
    .tab.active { background: rgba(99,102,241,0.15); color: var(--text); }
    .tab:hover:not(.active) { color: var(--text2); }

    /* Loading */
    .loading { text-align: center; padding: 48px; color: var(--text3); }
    .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin: 0 2px; animation: pulse 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,80%,100%{opacity:0.2;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }

    /* Drawer */
    .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; }
    .drawer-overlay.open { display: block; }
    .drawer { position: fixed; top: 0; right: -560px; width: 540px; height: 100vh; background: var(--surface); border-left: 1px solid var(--border); z-index: 201; transition: right 0.25s ease; overflow-y: auto; display: flex; flex-direction: column; }
    .drawer.open { right: 0; }
    .drawer-header { display: flex; align-items: flex-start; justify-content: space-between; padding: 24px 24px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .drawer-title { font-size: 16px; font-weight: 700; line-height: 1.3; }
    .drawer-close { background: none; border: none; color: var(--text3); font-size: 22px; cursor: pointer; line-height: 1; padding: 0; margin-left: 12px; flex-shrink: 0; }
    .drawer-body { padding: 20px 24px; flex: 1; }
    .drawer-section { margin-bottom: 24px; }
    .drawer-section-title { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
    .drawer-field { display: flex; gap: 8px; margin-bottom: 8px; font-size: 13px; }
    .drawer-field-label { color: var(--text3); width: 90px; flex-shrink: 0; }
    .drawer-field-value { color: var(--text2); }
    .email-preview { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px; font-size: 13px; color: var(--text2); white-space: pre-wrap; line-height: 1.6; max-height: 200px; overflow-y: auto; }
    .drawer-actions { display: flex; gap: 8px; flex-wrap: wrap; padding: 16px 24px; border-top: 1px solid var(--border); flex-shrink: 0; }
    .reply-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; color: var(--text); font-size: 13px; outline: none; margin-top: 8px; }
    .reply-input:focus { border-color: var(--accent); }

    /* Responsive */
    @media (max-width: 900px) {
      .analytics-grid { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .drawer { width: 100%; right: -100%; }
    }
    @media (max-width: 640px) {
      .main { padding: 20px; }
      .stats { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" style="border-radius:7px;flex-shrink:0">
        <defs><linearGradient id="crmG" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#6366F1"/><stop offset="1" stop-color="#7C3AED"/></linearGradient></defs>
        <rect width="64" height="64" rx="14" fill="#0A0F1E"/>
        <path d="M8 56 L32 8 L40 24 L24 56 Z" fill="url(#crmG)"/>
        <path d="M40 24 L56 56 L32 56 L32 40 Z" fill="url(#crmG)" opacity="0.55"/>
        <path d="M32 40 L40 40 L40 24 L36 32 Z" fill="url(#crmG)"/>
      </svg>
      Aevon CRM
    </div>
    <div style="padding:0 20px 16px;margin-top:-8px">
      <button class="btn btn-ghost" id="themeToggle" onclick="toggleTheme()" style="width:100%;font-size:12px;padding:6px 10px">☀ Light mode</button>
    </div>
    <div class="nav-section">Outreach</div>
    <div class="nav-item active" onclick="showView('pipeline', event)">
      <span>&#9776;</span> Pipeline
    </div>
    <div class="nav-item" onclick="showView('outreach', event)">
      <span>&#9993;</span> Outreach
    </div>
    <div class="nav-item" onclick="showView('analytics', event)">
      <span>&#9641;</span> Analytics
    </div>
    <div class="nav-item" onclick="showView('activity', event)">
      <span>&#9680;</span> Activity
    </div>
    <div class="nav-section">Business</div>
    <div class="nav-item" onclick="showView('customers', event)">
      <span>&#9786;</span> Customers
    </div>
    <div class="nav-item" onclick="showView('projects', event)">
      <span>&#10697;</span> Projects
    </div>
    <div class="nav-item" onclick="showView('invoices', event)">
      <span>&#9654;</span> Invoices
    </div>
  </aside>

  <!-- Main -->
  <main class="main" id="main">
    <div class="loading"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
  </main>
</div>

<!-- Add Customer Modal -->
<div class="modal-overlay" id="customerModal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Add Customer</div>
      <button class="modal-close" onclick="closeModal()">&#215;</button>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Company Name</label>
        <input class="form-input" id="f-company" placeholder="Acme Corp">
      </div>
      <div class="form-group">
        <label class="form-label">Contact Name</label>
        <input class="form-input" id="f-contact" placeholder="Jane Smith">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" id="f-email" type="email" placeholder="jane@acme.com">
      </div>
      <div class="form-group">
        <label class="form-label">Phone</label>
        <input class="form-input" id="f-phone" placeholder="+1 604-555-0100">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Industry</label>
        <input class="form-input" id="f-industry" placeholder="Property Management">
      </div>
      <div class="form-group">
        <label class="form-label">City</label>
        <input class="form-input" id="f-city" placeholder="Vancouver BC">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Website</label>
      <input class="form-input" id="f-website" placeholder="https://acme.com">
    </div>
    <div class="form-group">
      <label class="form-label">Status</label>
      <select class="form-input filter-select" id="f-status" style="width:100%">
        <option value="prospect">Prospect</option>
        <option value="active">Active</option>
        <option value="completed">Completed</option>
        <option value="churned">Churned</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Notes</label>
      <input class="form-input" id="f-notes" placeholder="Optional notes">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveCustomer()">Save Customer</button>
    </div>
  </div>
</div>

<!-- Add Project Modal -->
<div class="modal-overlay" id="projectModal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Add Project</div>
      <button class="modal-close" onclick="closeProjectModal()">&#215;</button>
    </div>
    <div class="form-group">
      <label class="form-label">Customer</label>
      <select class="form-input filter-select" id="p-customer" style="width:100%"></select>
    </div>
    <div class="form-group">
      <label class="form-label">Project Name</label>
      <input class="form-input" id="p-name" placeholder="Internal Ticketing App">
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <input class="form-input" id="p-description" placeholder="Brief description">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-input filter-select" id="p-status" style="width:100%">
          <option value="scoping">Scoping</option>
          <option value="in_progress">In Progress</option>
          <option value="review">Review</option>
          <option value="completed">Completed</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Build Fee ($)</label>
        <input class="form-input" id="p-fee" type="number" placeholder="3000">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Monthly Fee ($)</label>
        <input class="form-input" id="p-monthly" type="number" placeholder="65">
      </div>
      <div class="form-group">
        <label class="form-label">Due Date</label>
        <input class="form-input" id="p-due" type="date">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeProjectModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveProject()">Save Project</button>
    </div>
  </div>
</div>

<!-- Lead Detail Drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="leadDrawer">
  <div class="drawer-header">
    <div>
      <div class="drawer-title" id="drawerTitle"></div>
      <div style="font-size:12px;color:var(--text3);margin-top:4px" id="drawerSubtitle"></div>
    </div>
    <button class="drawer-close" onclick="closeDrawer()">&#215;</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-actions" id="drawerActions"></div>
</div>

<!-- Invoice Modal -->
<div class="modal-overlay" id="invoiceModal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="invoiceModalTitle">Add Invoice</div>
      <button class="modal-close" onclick="closeInvoiceModal()">&#215;</button>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Customer</label>
        <select class="form-input filter-select" id="inv-customer" style="width:100%"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Project (optional)</label>
        <select class="form-input filter-select" id="inv-project" style="width:100%"></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Invoice #</label>
        <input class="form-input" id="inv-number" placeholder="INV-001">
      </div>
      <div class="form-group">
        <label class="form-label">Amount ($)</label>
        <input class="form-input" id="inv-amount" type="number" placeholder="3000">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-input filter-select" id="inv-status" style="width:100%">
          <option value="draft">Draft</option>
          <option value="sent">Sent</option>
          <option value="paid">Paid</option>
          <option value="overdue">Overdue</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Due Date</label>
        <input class="form-input" id="inv-due" type="date">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Paid Date</label>
      <input class="form-input" id="inv-paid" type="date">
    </div>
    <div class="form-group">
      <label class="form-label">Notes</label>
      <input class="form-input" id="inv-notes" placeholder="Optional notes">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeInvoiceModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveInvoice()">Save Invoice</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>

      sb.from('projects').select('id, name, created_at, status, customers(company_name)').order('created_at', { ascending: false }).limit(10),
    ]);

    // Merge all events into a single timeline
    const timeline = [
      ...(events || []).map(e => ({
        time: e.created_at,
        type: 'email',
        event: e.event_type,
        label: e.leads?.business_name || 'Unknown',
        badge: e.event_type,
      })),
      ...(leads || []).map(l => ({
        time: l.created_at,
        type: 'lead',
        event: 'lead_added',
        label: l.business_name,
        badge: 'queued',
      })),
      ...(customers || []).map(c => ({
        time: c.created_at,
        type: 'customer',
        event: 'customer_added',
        label: c.company_name,
        badge: c.status,
      })),
      ...(projects || []).map(p => ({
        time: p.created_at,
        type: 'project',
        event: 'project_added',
        label: `${p.name} (${p.customers?.company_name || ''})`,
        badge: p.status,

    const icons = { email: '✉', lead: '◎', customer: '★', project: '◈' };
    const labels = {
      email: 'Email', lead_added: 'Lead added', customer_added: 'Customer added',
      project_added: 'Project created', sent: 'Email sent', opened: 'Email opened',
      clicked: 'Link clicked', replied: 'Replied', bounced: 'Bounced', delivered: 'Delivered',
    };

    document.getElementById('main').innerHTML = `
      <div class="page-header">
        <div class="page-title">Activity Feed</div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Time</th><th>Type</th><th>Event</th><th>Name</th></tr></thead>
          <tbody>${timeline.length ? timeline.map(item => `<tr>
            <td style="color:var(--text3);font-size:12px;white-space:nowrap">${new Date(item.time).toLocaleString('en-CA', { timeZone: 'America/Vancouver' })}</td>
            <td style="color:var(--text3);font-size:12px">${icons[item.type] || ''} ${item.type}</td>
            <td><span class="badge badge-${item.badge}">${labels[item.event] || item.event}</span></td>
            <td style="color:var(--text2)">${item.label}</td>
          </tr>`).join('') : '<tr><td colspan="4" class="empty">No activity yet.</td></tr>'}</tbody>
        </table>
      </div>
    `;
  }

  // ── Lead Drawer (kept for compatibility) ─────────────────────

    const { data: events } = await sb.from('email_events').select('*').eq('lead_id', id).order('created_at', { ascending: true });

        ${lead.email ? `<div class="drawer-field"><span class="drawer-field-label">Email</span><span class="drawer-field-value">${lead.email}</span></div>` : ''}
        ${lead.phone ? `<div class="drawer-field"><span class="drawer-field-label">Phone</span><span class="drawer-field-value">${lead.phone}</span></div>` : ''}
        ${lead.address ? `<div class="drawer-field"><span class="drawer-field-label">Address</span><span class="drawer-field-value">${lead.address}</span></div>` : ''}
        ${lead.qualification_score ? `<div class="drawer-field"><span class="drawer-field-label">Fit Score</span><span class="score ${scoreClass}">${lead.qualification_score}</span></div>` : ''}
        ${lead.qualification_notes ? `<div class="drawer-field"><span class="drawer-field-label">Notes</span><span class="drawer-field-value" style="font-style:italic">${lead.qualification_notes}</span></div>` : ''}
      </div>

      <div class="drawer-section">
        <div class="drawer-section-title">Initial Email</div>
        <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px">${lead.email_subject}</div>
        <div class="email-preview">${lead.email_body || ''}</div>

      ${lead.followup_subject ? `
      <div class="drawer-section">
        <div class="drawer-section-title">Follow-up Email</div>
        <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px">${lead.followup_subject}</div>
        <div class="email-preview">${lead.followup_body || ''}</div>
      </div>` : ''}

      <div class="drawer-section">
        <div class="drawer-section-title">Email Events</div>

          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:12px">
            <span class="badge badge-${e.event_type}">${e.event_type}</span>
            <span style="color:var(--text3)">${new Date(e.created_at).toLocaleString('en-CA', { timeZone: 'America/Vancouver' })}</span>

  function closeDrawer() {
    document.getElementById('drawerOverlay').classList.remove('open');
    document.getElementById('leadDrawer').classList.remove('open');
  }

  async function pauseLead(leadId) {
    const { error } = await sb.from('leads').update({ status: 'paused', scheduled_send_at: null }).eq('id', leadId);
    if (error) { alert('Error: ' + error.message); return; }
    renderLeadProfile(leadId);
  }

  function showQueuePicker(leadId) {
    const existing = document.getElementById('queue-picker');
    if (existing) { existing.remove(); return; }
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    tomorrow.setHours(9, 0, 0, 0);
    const localIso = new Date(tomorrow - tomorrow.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
    const div = document.createElement('div');
    div.id = 'queue-picker';
    div.style.cssText = 'display:flex;align-items:center;gap:8px;padding:12px 0 0;flex-wrap:wrap';
    div.innerHTML = `
      <input type="datetime-local" id="queue-dt" value="${localIso}" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 10px;font-size:13px">
      <button class="btn btn-primary" style="font-size:13px" onclick="confirmQueue('${leadId}')">Confirm</button>
      <button class="btn btn-ghost" style="font-size:13px" onclick="document.getElementById('queue-picker').remove()">Cancel</button>
    `;
    document.querySelector('.page-header').after(div);
  }

  async function confirmQueue(leadId) {
    const dt = document.getElementById('queue-dt')?.value;
    if (!dt) { alert('Pick a date first.'); return; }
    const utcIso = new Date(dt).toISOString();
    const { error } = await sb.from('leads').update({ status: 'queued', scheduled_send_at: utcIso }).eq('id', leadId);
    if (error) { alert('Error: ' + error.message); return; }
    renderLeadProfile(leadId);
  }

  async function markReplied(leadId) {
    const note = document.getElementById('replyNote')?.value.trim() || null;
    const { error } = await sb.from('leads').update({ status: 'replied' }).eq('id', leadId);
    if (error) { alert('Failed to update lead status.'); return; }
    await sb.from('email_events').insert({ lead_id: leadId, event_type: 'replied', metadata: { manual: true, note } });
    closeDrawer();
    if (currentView === 'lead-profile') {
      renderLeadProfile(leadId);
    } else {
      renderView('pipeline');
    }
  }

  async function convertToCustomer(lead) {
    const { data: existing } = await sb.from('customers').select('id').eq('company_name', lead.business_name).limit(1);
    if (existing && existing.length > 0) {
      alert('A customer with this name already exists.');
      return;
    }
    const { error: insertErr } = await sb.from('customers').insert({
      company_name: lead.business_name,
      email: lead.email,
      phone: lead.phone,
      website: lead.website,
      industry: lead.industry,
      city: lead.city,
      status: 'prospect',
      lead_id: lead.id,
    });
    if (insertErr) { alert('Failed to create customer: ' + insertErr.message); return; }
    await sb.from('leads').update({ status: 'converted' }).eq('id', lead.id);
    closeDrawer();
    alert(`${lead.business_name} added to Customers.`);
    renderView('customers');
  }

  function filterPipeline() {
    const status = document.getElementById('statusFilter')?.value || '';
    const search = document.getElementById('pipelineSearch')?.value.toLowerCase() || '';
    let filtered = window._allLeads || [];
    if (status) filtered = filtered.filter(l => l.status === status);
    if (search) filtered = filtered.filter(l =>
      l.business_name?.toLowerCase().includes(search) ||
      l.industry?.toLowerCase().includes(search) ||
      l.city?.toLowerCase().includes(search) ||
      l.email?.toLowerCase().includes(search)
    );
    const body = document.getElementById('pipelineBody');
    if (body) body.innerHTML = renderLeadRows(filtered, window._eventMap || {});
  }

  // ── Analytics ────────────────────────────────────────────────
  async function renderAnalytics() {
    const [{ data: leads }, { data: events }, { data: scheduled }] = await Promise.all([
      sb.from('leads').select('id, status, industry, city, qualification_score, email, email_subject, opened_at, clicked_at, sequence_step, last_sent_at'),
      sb.from('email_events').select('event_type, created_at, lead_id').order('created_at', { ascending: false }).limit(500),
      sb.from('leads').select('scheduled_send_at').eq('status','queued').not('scheduled_send_at','is',null).not('email_subject','is',null),
    ]);

    const L = leads || [];
    const E = events || [];
    const total = L.length;
    const hasEmail = L.filter(l => l.email).length;
    const personalized = L.filter(l => l.email_subject).length;
    const queuedCount = L.filter(l => l.status === 'queued').length;
    const paused = L.filter(l => l.status === 'paused').length;
    const replied = L.filter(l => l.status === 'replied').length;
    const bounced = L.filter(l => l.status === 'bounced').length;
    const opened = L.filter(l => l.opened_at).length;
    const clicked = L.filter(l => l.clicked_at).length;

    // Use email_events for accurate send counts
    const sentEvents = E.filter(e => e.event_type === 'sent');
    const emailsSent = sentEvents.length;
    const uniqueLeadsSent = new Set(sentEvents.map(e => e.lead_id)).size;

    const openRate = emailsSent ? Math.round(opened / uniqueLeadsSent * 100) : 0;
    const clickRate = emailsSent ? Math.round(clicked / uniqueLeadsSent * 100) : 0;
    const bounceRate = emailsSent ? Math.round(bounced / uniqueLeadsSent * 100) : 0;
    const replyRate = emailsSent ? Math.round(replied / uniqueLeadsSent * 100) : 0;

    // Daily send volume (last 30 days from email_events)
    const sendsByDay = {};
    sentEvents.forEach(e => {
      const d = new Date(e.created_at).toLocaleDateString('en-CA', { timeZone: 'America/Vancouver' });
      sendsByDay[d] = (sendsByDay[d] || 0) + 1;
    });
    const sendDays = Object.entries(sendsByDay).sort((a,b) => a[0].localeCompare(b[0])).slice(-20);
    const maxSendDay = Math.max(...sendDays.map(d => d[1]), 1);

    // Forward pipeline: scheduled sends per day
    const pipeline = {};
    (scheduled || []).forEach(l => {
      const d = new Date(l.scheduled_send_at).toLocaleDateString('en-CA', { timeZone: 'America/Vancouver' });
      pipeline[d] = (pipeline[d] || 0) + 1;
    });
    const pipelineDays = Object.entries(pipeline).sort((a,b) => a[0].localeCompare(b[0])).slice(0, 14);
    const maxPipe = Math.max(...pipelineDays.map(d => d[1]), 1);

    // By industry — top 12
    const byIndustry = {};
    L.forEach(l => { if (l.industry) byIndustry[l.industry] = (byIndustry[l.industry] || 0) + 1; });
    const topIndustries = Object.entries(byIndustry).sort((a,b) => b[1]-a[1]).slice(0, 12);
    const maxInd = topIndustries[0]?.[1] || 1;

    // By city
    const byCity = {};
    L.forEach(l => { if (l.city) byCity[l.city] = (byCity[l.city] || 0) + 1; });
    const topCities = Object.entries(byCity).sort((a,b) => b[1]-a[1]).slice(0, 10);
    const maxCity = topCities[0]?.[1] || 1;

    // Score distribution
    const scoreBuckets = { '10': 0, '9': 0, '8': 0, '7': 0, '≤6': 0 };
    L.forEach(l => {
      const s = l.qualification_score;
      if (!s) return;
      if (s >= 10) scoreBuckets['10']++;
      else if (s === 9) scoreBuckets['9']++;
      else if (s === 8) scoreBuckets['8']++;
      else if (s === 7) scoreBuckets['7']++;
      else scoreBuckets['≤6']++;
    });
    const maxScore = Math.max(...Object.values(scoreBuckets), 1);

    const fmtDay = d => { const [y,m,day] = d.split('-'); return `${parseInt(m)}/${parseInt(day)}`; };

    document.getElementById('main').innerHTML = `
      <div class="page-header"><div class="page-title">Analytics</div></div>

      <!-- Top metrics -->
      <div class="stats" style="grid-template-columns:repeat(6,1fr);margin-bottom:20px">
        <div class="stat-card"><div class="stat-label">Total Leads</div><div class="stat-value">${total}</div><div class="stat-sub">${hasEmail} have email</div></div>
        <div class="stat-card"><div class="stat-label">Personalized</div><div class="stat-value">${personalized}</div><div class="stat-sub">${queuedCount} queued · ${paused} paused</div></div>
        <div class="stat-card"><div class="stat-label">Emails Sent</div><div class="stat-value">${emailsSent}</div><div class="stat-sub">${uniqueLeadsSent} unique leads</div></div>
        <div class="stat-card"><div class="stat-label">Open Rate</div><div class="stat-value" style="color:${openRate>20?'var(--green)':openRate>10?'var(--yellow)':'var(--text)'}">${openRate}%</div><div class="stat-sub">${opened} opened</div></div>
        <div class="stat-card"><div class="stat-label">Reply Rate</div><div class="stat-value" style="color:${replyRate>5?'var(--green)':'var(--text)'}">${replyRate}%</div><div class="stat-sub">${replied} replied</div></div>
        <div class="stat-card"><div class="stat-label">Bounce Rate</div><div class="stat-value" style="color:${bounceRate>5?'var(--red)':'var(--text)'}">${bounceRate}%</div><div class="stat-sub">${bounced} bounced</div></div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
        <!-- Send volume -->
        <div class="analytics-card">
          <div class="analytics-title">Send Volume <span style="font-weight:400;color:var(--text3)">(last 20 send days)</span></div>
          ${sendDays.length === 0
            ? `<div style="color:var(--text3);font-size:13px">No sends yet.</div>`
            : sendDays.map(([d, n]) => `
              <div class="metric-row">
                <span class="metric-label" style="font-size:11px;width:48px">${fmtDay(d)}</span>
                <div class="metric-bar-wrap"><div class="metric-bar" style="width:${Math.round(n/maxSendDay*100)}%;background:#6366F1"></div></div>
                <span class="metric-val">${n}</span>
              </div>`).join('')}
        </div>

        <!-- Forward pipeline -->
        <div class="analytics-card">
          <div class="analytics-title">Send Pipeline <span style="font-weight:400;color:var(--text3)">(next 14 scheduled days)</span></div>
          ${pipelineDays.length === 0
            ? `<div style="color:var(--text3);font-size:13px">No emails scheduled.</div>`
            : pipelineDays.map(([d, n]) => `
              <div class="metric-row">
                <span class="metric-label" style="font-size:11px;width:48px">${fmtDay(d)}</span>
                <div class="metric-bar-wrap"><div class="metric-bar" style="width:${Math.round(n/maxPipe*100)}%;background:#7C3AED"></div></div>
                <span class="metric-val">${n}</span>
              </div>`).join('')}
        </div>
      </div>

      <div class="analytics-grid" style="grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
        <!-- By industry -->
        <div class="analytics-card">
          <div class="analytics-title">Leads by Industry <span style="font-weight:400;color:var(--text3)">(top 12)</span></div>
          ${topIndustries.map(([ind, count]) => `
            <div class="metric-row">
              <span class="metric-label" style="width:160px;font-size:11.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${ind}">${ind}</span>
              <div class="metric-bar-wrap"><div class="metric-bar" style="width:${Math.round(count/maxInd*100)}%;background:#6366F1"></div></div>
              <span class="metric-val">${count}</span>
            </div>`).join('')}
        </div>

        <!-- By city + score -->
        <div style="display:flex;flex-direction:column;gap:16px">
          <div class="analytics-card">
            <div class="analytics-title">Leads by City</div>
            ${topCities.map(([city, count]) => `
              <div class="metric-row">
                <span class="metric-label" style="font-size:11.5px">${city.replace(' BC','')}</span>
                <div class="metric-bar-wrap"><div class="metric-bar" style="width:${Math.round(count/maxCity*100)}%;background:#7C3AED"></div></div>
                <span class="metric-val">${count}</span>
              </div>`).join('')}
          </div>
          <div class="analytics-card">
            <div class="analytics-title">Score Distribution</div>
            ${Object.entries(scoreBuckets).map(([label, count]) => `
              <div class="metric-row">
                <span class="metric-label" style="font-size:11.5px">Score ${label}</span>
                <div class="metric-bar-wrap"><div class="metric-bar" style="width:${Math.round(count/maxScore*100)}%;background:${label==='10'?'#4ADE80':label==='9'?'#6366F1':label==='8'?'#818CF8':label==='7'?'#EAB308':'#EF4444'}"></div></div>
                <span class="metric-val">${count}</span>
              </div>`).join('')}
          </div>
        </div>
      </div>

      <!-- Campaign funnel + recent events -->
      <div class="analytics-grid" style="grid-template-columns:1fr 1fr;gap:16px">
        <div class="analytics-card">
          <div class="analytics-title">Campaign Funnel</div>
          ${bar('Contacted', uniqueLeadsSent, total, '#6366F1')}
          ${bar('Opened', opened, uniqueLeadsSent || 1, '#22C55E')}
          ${bar('Clicked', clicked, uniqueLeadsSent || 1, '#FB923C')}
          ${bar('Replied', replied, uniqueLeadsSent || 1, '#F59E0B')}
          ${bar('Bounced', bounced, uniqueLeadsSent || 1, '#EF4444')}
        </div>
        <div class="analytics-card">
          <div class="analytics-title">Recent Email Events</div>
          ${E.length === 0
            ? `<div style="color:var(--text3);font-size:13px;padding:8px 0">No events yet.</div>`
            : E.slice(0,12).map(e => `
                <div style="display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px">
                  <span style="color:var(--text3);width:76px;flex-shrink:0">${new Date(e.created_at).toLocaleDateString('en-CA', { timeZone: 'America/Vancouver' })}</span>
                  <span class="badge badge-${e.event_type}" style="font-size:10px;padding:2px 7px">${e.event_type}</span>
                </div>`).join('')}
        </div>
      </div>
    `;
  }

  function bar(label, val, total, color) {
    const pct = total ? Math.round(val / total * 100) : 0;
    return `<div class="metric-row">
      <span class="metric-label">${label}</span>
      <div class="metric-bar-wrap"><div class="metric-bar" style="width:${pct}%;background:${color}"></div></div>
      <span class="metric-val">${pct}%</span>
    </div>`;
  }

  function relativeDate(dateStr) {
    if (!dateStr) return '<span style="opacity:0.3">—</span>';
    const date = new Date(dateStr);
    const now = new Date();
    const diffDays = Math.round((date - now) / 86400000);
    if (diffDays === 0) return '<span style="color:var(--green);font-weight:600">Today</span>';
    if (diffDays === 1) return '<span style="color:var(--yellow)">Tomorrow</span>';
    if (diffDays === -1) return '<span style="color:var(--text3)">Yesterday</span>';
    if (diffDays > 0) return `<span style="color:var(--text3)">in ${diffDays}d</span>`;
    return `<span style="color:var(--red)">${Math.abs(diffDays)}d overdue</span>`;
  }

  function relativeAgo(dateStr) {
    if (!dateStr) return '<span style="opacity:0.3">—</span>';
    const diffDays = Math.floor((Date.now() - new Date(dateStr)) / 86400000);
    if (diffDays === 0) return '<span style="color:var(--text2)">Today</span>';
    if (diffDays === 1) return '1d ago';
    if (diffDays < 30) return `${diffDays}d ago`;
    if (diffDays < 60) return '1mo ago';
    return `${Math.floor(diffDays / 30)}mo ago`;
  }

  function openStatusPicker(el, leadId, currentStatus) {
    document.querySelectorAll('.status-picker').forEach(p => p.remove());
    const statuses = ['queued','paused','sent','replied','bounced','converted'];
    const picker = document.createElement('div');
    picker.className = 'status-picker';
    picker.innerHTML = statuses.map(s =>
      `<div class="badge badge-${s} status-opt" onclick="selectLeadStatus('${leadId}','${s}')">${s}</div>`
    ).join('');
    const rect = el.getBoundingClientRect();
    picker.style.left = rect.left + 'px';
    picker.style.top = (rect.bottom + 4) + 'px';
    document.body.appendChild(picker);
    setTimeout(() => document.addEventListener('click', () => document.querySelectorAll('.status-picker').forEach(p => p.remove()), { once: true }), 0);
  }

  async function selectLeadStatus(leadId, newStatus) {
    document.querySelectorAll('.status-picker').forEach(p => p.remove());
    const lead = (window._outreachLeads || []).find(l => l.id === leadId);
    if (lead) lead.status = newStatus;
    await sb.from('leads').update({ status: newStatus }).eq('id', leadId);
    filterOutreach();
  }

  function exportCSV() {
    const leads = window._filteredLeads || window._outreachLeads || [];
    if (!leads.length) { alert('No leads to export.'); return; }
    const headers = ['business_name','industry','city','email','qualification_score','status','last_sent_at','scheduled_send_at','notes'];
    const rows = leads.map(l => headers.map(h => {
      const v = l[h] ?? '';
      return `"${String(v).replace(/"/g, '""')}"`;
    }).join(','));
    const csv = [headers.join(','), ...rows].join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
    a.download = `aevon-leads-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  }

  function toggleEmailEdit(type) {
    const view = document.getElementById(type + '-view');
    const edit = document.getElementById(type + '-edit');
    if (!view || !edit) return;
    const isEditing = edit.style.display !== 'none';
    view.style.display = isEditing ? '' : 'none';
    edit.style.display = isEditing ? 'none' : '';
  }

  async function saveEmailEdit(leadId, type) {
    const subject = document.getElementById(`edit-${type}-subject`)?.value.trim();
    const body    = document.getElementById(`edit-${type}-body`)?.value.trim();
    if (!subject || !body) { alert('Subject and body are required.'); return; }
    const field = type === 'initial'
      ? { email_subject: subject, email_body: body }
      : { followup_subject: subject, followup_body: body };
    const { error } = await sb.from('leads').update(field).eq('id', leadId);
    if (error) { alert('Save failed: ' + error.message); return; }
    // Update view without full reload
    const viewEl = document.getElementById(type + '-view');
    if (viewEl) {
      viewEl.querySelector('div').textContent = subject;
      viewEl.querySelector('.email-preview').textContent = body;
    }
    toggleEmailEdit(type);
  }

  async function saveLeadNotes(id) {
    const notes = document.getElementById('leadNotesInput')?.value ?? '';

  function applyOutreachSort(leads) {
    const { col, dir } = window._outreachSort;
    const isDate = col === 'scheduled_send_at';
    const nullVal = dir === 'asc' ? '￿' : '';
    return [...leads].sort((a, b) => {
      let av = a[col], bv = b[col];
      if (isDate) {
        av = av ? new Date(av).getTime() : (dir === 'asc' ? Infinity : -Infinity);
        bv = bv ? new Date(bv).getTime() : (dir === 'asc' ? Infinity : -Infinity);
      } else {
        if (av == null) av = nullVal;
        if (bv == null) bv = nullVal;
        if (typeof av === 'string') av = av.toLowerCase();
        if (typeof bv === 'string') bv = bv.toLowerCase();
      }
      if (av < bv) return dir === 'asc' ? -1 : 1;
      if (av > bv) return dir === 'asc' ? 1 : -1;
      return 0;
    });
  }

  function sortOutreach(col) {
    const s = window._outreachSort;
    s.dir = s.col === col && s.dir === 'desc' ? 'asc' : 'desc';
    s.col = col;
    ['business_name','industry','city','qualification_score','status','last_sent_at','scheduled_send_at'].forEach(c => {
      const el = document.getElementById('sort-' + c);
      if (el) el.textContent = c === col ? (s.dir === 'asc' ? '▲' : '▼') : '';

      const canToggle = ['queued','paused'].includes(l.status);
      return `<tr>
        <td onclick="event.stopPropagation()"><input type="checkbox" class="lead-check" data-id="${l.id}" onchange="updateBulkBar()" style="cursor:pointer"></td>
        <td style="cursor:pointer;color:var(--text);font-weight:500" onclick="openLeadProfile('${l.id}')">${l.business_name}${hasEmail}</td>
        <td style="color:var(--text3);font-size:12px;max-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${l.industry||''}</td>
        <td style="color:var(--text3);font-size:12px">${(l.city||'').replace(' BC','')}</td>
        <td>${l.qualification_score ? `<span class="score ${scoreClass}">${l.qualification_score}</span>` : ''}</td>
        <td onclick="event.stopPropagation()"><span class="badge badge-${l.status}" style="cursor:pointer" onclick="openStatusPicker(this,'${l.id}','${l.status}')">${l.status}</span></td>
        <td style="font-size:12px;color:var(--text3)">${relativeAgo(l.last_sent_at)}</td>
        <td style="font-size:12px">${relativeDate(l.scheduled_send_at)}</td>
        <td onclick="event.stopPropagation()" style="white-space:nowrap;text-align:right">
          ${canToggle ? `<button data-id="${l.id}" data-status="${l.status}" onclick="togglePauseBtn(this)" title="${isPaused?'Resume':'Pause'}" style="background:none;border:none;cursor:pointer;font-size:14px;color:var(--text3);padding:3px 5px;border-radius:4px">${isPaused?'▶':'⏸'}</button>` : ''}
          <button data-id="${l.id}" data-name="${nameEsc}" onclick="deleteLeadBtn(this)" title="Delete" style="background:none;border:none;cursor:pointer;font-size:14px;color:var(--text3);padding:3px 5px;border-radius:4px" onmouseover="this.style.color='#F87171'" onmouseout="this.style.color='var(--text3)'">&#128465;</button>
        </td>
      </tr>`;
    }).join('');
  }

  function filterOutreach() {
    const status   = document.getElementById('outreachFilter')?.value || '';
    const industry = document.getElementById('industryFilter')?.value || '';
    const city     = document.getElementById('cityFilter')?.value || '';
    const score    = document.getElementById('scoreFilter')?.value || '';
    const ready    = document.getElementById('readyFilter')?.value || '';
    const q        = (document.getElementById('outreachSearch')?.value || '').toLowerCase();
    let leads = (window._outreachLeads || []).filter(l => {
      if (status   && l.status !== status) return false;
      if (industry && l.industry !== industry) return false;
      if (city     && l.city !== city) return false;
      if (score    && String(l.qualification_score) !== score) return false;
      if (ready === 'ready'    && !l.email_subject) return false;
      if (ready === 'notready' && l.email_subject)  return false;
      if (q && !l.business_name.toLowerCase().includes(q)) return false;
      return true;
    });
    leads = applyOutreachSort(leads);
    window._filteredLeads = leads;
    const body = document.getElementById('outreachBody');
    if (body) body.innerHTML = renderOutreachRows(leads);
  }

  function clearOutreachFilters() {
    ['outreachFilter','industryFilter','cityFilter','scoreFilter','readyFilter'].forEach(id => {
      const el = document.getElementById(id); if (el) el.value = '';
    });
    const s = document.getElementById('outreachSearch'); if (s) s.value = '';
    filterOutreach();
  }

  function toggleSelectAll(cb) {
    document.querySelectorAll('.lead-check').forEach(c => {
      const row = c.closest('tr');
      if (row && row.style.display !== 'none') c.checked = cb.checked;
    });
    updateBulkBar();
  }

  function updateBulkBar() {
    const checked = document.querySelectorAll('.lead-check:checked');
    const bar = document.getElementById('bulk-bar');
    if (!bar) return;
    bar.style.display = checked.length > 0 ? 'flex' : 'none';
    const el = document.getElementById('bulk-count');
    if (el) el.textContent = `${checked.length} selected`;
  }

  function clearSelection() {
    document.querySelectorAll('.lead-check').forEach(c => c.checked = false);
    const sa = document.getElementById('selectAll');
    if (sa) sa.checked = false;
    updateBulkBar();
  }

  function getSelectedIds() {
    return [...document.querySelectorAll('.lead-check:checked')].map(c => c.dataset.id);
  }

  async function togglePauseBtn(btn) {
    const id = btn.dataset.id;
    if (!id) return;
    const currentStatus = btn.dataset.status;
    const newStatus = currentStatus === 'queued' ? 'paused' : 'queued';
    const update = { status: newStatus };
    if (newStatus === 'paused') update.scheduled_send_at = null;

    btn.disabled = true;
    const { error } = await sb.from('leads').update(update).eq('id', id);
    if (error) { alert('Error: ' + error.message); btn.disabled = false; return; }

    // Update row in-place — no re-render, no reordering confusion
    const row = btn.closest('tr');
    const badge = row.querySelector('.badge');
    if (badge) { badge.className = `badge badge-${newStatus}`; badge.textContent = newStatus; }
    const cells = row.querySelectorAll('td');
    if (newStatus === 'paused' && cells[6]) cells[6].innerHTML = '<span style="opacity:0.35">none</span>';
    btn.dataset.status = newStatus;
    btn.title = newStatus === 'paused' ? 'Resume' : 'Pause';
    btn.textContent = newStatus === 'paused' ? '▶' : '⏸';
    btn.disabled = false;

    if (window._outreachLeads) {
      const lead = window._outreachLeads.find(l => l.id === id);
      if (lead) { lead.status = newStatus; if (newStatus === 'paused') lead.scheduled_send_at = null; }
    }
  }

  async function deleteLeadBtn(btn) {
    const id = btn.dataset.id;
    const name = btn.dataset.name;
    if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
    const { error } = await sb.from('leads').delete().eq('id', id);
    if (error) { alert('Error: ' + error.message); return; }
    btn.closest('tr').remove();
    if (window._outreachLeads) window._outreachLeads = window._outreachLeads.filter(l => l.id !== id);
  }

  async function bulkPause() {
    const ids = getSelectedIds();
    if (!ids.length) return;
    const { error } = await sb.from('leads').update({ status: 'paused', scheduled_send_at: null }).in('id', ids);
    if (error) { alert('Error: ' + error.message); return; }
    renderOutreach();
  }

  async function bulkResume() {
    const ids = getSelectedIds();
    if (!ids.length) return;
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    tomorrow.setUTCHours(16, 0, 0, 0);
    const { error } = await sb.from('leads').update({ status: 'queued', scheduled_send_at: tomorrow.toISOString() }).in('id', ids);
    if (error) { alert('Error: ' + error.message); return; }
    renderOutreach();
  }

  async function bulkScheduleToday() {
    const ids = getSelectedIds();
    if (!ids.length) return;
    const sendAt = new Date();
    sendAt.setHours(9, 0, 0, 0);
    if (sendAt < new Date()) sendAt.setTime(Date.now() + 2 * 60 * 1000);
    const { error } = await sb.from('leads').update({ status: 'queued', scheduled_send_at: sendAt.toISOString() }).in('id', ids);
    if (error) { alert('Error: ' + error.message); return; }
    clearSelection();
    renderOutreach();
  }

  async function bulkScheduleTomorrow() {
    const ids = getSelectedIds();
    if (!ids.length) return;
    const sendAt = new Date();
    sendAt.setDate(sendAt.getDate() + 1);
    sendAt.setHours(9, 0, 0, 0);
    const { error } = await sb.from('leads').update({ status: 'queued', scheduled_send_at: sendAt.toISOString() }).in('id', ids);
    if (error) { alert('Error: ' + error.message); return; }
    clearSelection();
    renderOutreach();
  }

  async function bulkScheduleDate() {
    const ids = getSelectedIds();
    if (!ids.length) return;
    const picker = document.getElementById('bulkDatePicker');
    if (!picker || !picker.value) { alert('Pick a date first.'); return; }
    const [y, m, d] = picker.value.split('-').map(Number);
    const sendAt = new Date(y, m - 1, d, 9, 0, 0, 0);
    const { error } = await sb.from('leads').update({ status: 'queued', scheduled_send_at: sendAt.toISOString() }).in('id', ids);
    if (error) { alert('Error: ' + error.message); return; }
    clearSelection();
    renderOutreach();
  }

  async function bulkDelete() {
    const ids = getSelectedIds();
    if (!ids.length) return;
    if (!confirm(`Delete ${ids.length} lead(s)? This cannot be undone.`)) return;
    const { error } = await sb.from('leads').delete().in('id', ids);
    if (error) { alert('Error: ' + error.message); return; }
    renderOutreach();
  }

  function showAddLeadModal() {
    document.getElementById('add-lead-modal').style.display = 'flex';
  }

  function closeAddLeadModal() {
    document.getElementById('add-lead-modal').style.display = 'none';
    ['newLeadName','newLeadEmail','newLeadIndustry','newLeadCity','newLeadWebsite','newLeadPhone'].forEach(id => {
      const el = document.getElementById(id); if (el) el.value = '';
    });
  }

  async function saveNewLead() {
    const name  = document.getElementById('newLeadName').value.trim();
    const email = document.getElementById('newLeadEmail').value.trim();
    if (!name || !email) { alert('Business name and email are required.'); return; }
    const { error } = await sb.from('leads').insert({
      business_name: name,
      email,
      industry: document.getElementById('newLeadIndustry').value.trim() || null,
      city:     document.getElementById('newLeadCity').value.trim() || null,
      website:  document.getElementById('newLeadWebsite').value.trim() || null,
      phone:    document.getElementById('newLeadPhone').value.trim() || null,
      status: 'queued',
      sequence_step: 0,
      source: 'manual',
    });
    if (error) { alert('Error: ' + error.message); return; }
    closeAddLeadModal();
    renderOutreach();
  }

  // ── Init ─────────────────────────────────────────────────────
  renderView('pipeline');
</script>

<!-- Add Lead Modal -->
<div id="add-lead-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeAddLeadModal()">
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <div class="modal-title">Add Lead</div>
      <button class="modal-close" onclick="closeAddLeadModal()">&#215;</button>
    </div>
    <div class="form-group">
      <label class="form-label">Business Name *</label>
      <input class="form-input" id="newLeadName" placeholder="Acme Property Management">
    </div>
    <div class="form-group">
      <label class="form-label">Email *</label>
      <input class="form-input" id="newLeadEmail" type="email" placeholder="info@acme.ca">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group">
        <label class="form-label">Industry</label>
        <input class="form-input" id="newLeadIndustry" placeholder="Property management">
      </div>
      <div class="form-group">
        <label class="form-label">City</label>
        <input class="form-input" id="newLeadCity" placeholder="Vancouver BC">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Website</label>
      <input class="form-input" id="newLeadWebsite" placeholder="https://acme.ca">
    </div>
    <div class="form-group">
      <label class="form-label">Phone</label>
      <input class="form-input" id="newLeadPhone" placeholder="604-555-0100">
    </div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-primary" onclick="saveNewLead()">Add Lead</button>
      <button class="btn btn-ghost" onclick="closeAddLeadModal()">Cancel</button>
    </div>
  </div>
</div>
</body>
</html>
